<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生成AIモデル ランキング(日本語版)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <header class="site-header">
    <h1>生成AIモデル ランキング</h1>
    <p class="updated">最終更新: 2026-07-07 11:33 (JST)</p>
  </header>
  <p class="note">arena.ai のランキングデータをもとに構成した非公式の日本語ミラーサイトです。</p>

  <div class="tabs" role="tablist" aria-label="カテゴリ">
    
    <button class="tab active"
            role="tab"
            id="tab-text"
            aria-selected="true"
            aria-controls="panel-text"
            tabindex="0"
            data-cat="text">テキスト</button>
    
    <button class="tab"
            role="tab"
            id="tab-code"
            aria-selected="false"
            aria-controls="panel-code"
            tabindex="-1"
            data-cat="code">コード</button>
    
    <button class="tab"
            role="tab"
            id="tab-vision"
            aria-selected="false"
            aria-controls="panel-vision"
            tabindex="-1"
            data-cat="vision">画像理解</button>
    
    <button class="tab"
            role="tab"
            id="tab-text-to-image"
            aria-selected="false"
            aria-controls="panel-text-to-image"
            tabindex="-1"
            data-cat="text-to-image">画像生成</button>
    
  </div>

  <div class="controls">
    <input type="search" id="search" placeholder="モデル名で検索" aria-label="モデル名で検索">
    <select id="company-filter" aria-label="提供企業で絞り込み">
      <option value="">すべての企業</option>
    </select>
  </div>

  
  <section id="panel-text"
           role="tabpanel"
           aria-labelledby="tab-text"
           class="panel">
    <table class="ranking-table" data-cat="text">
      <thead>
        <tr>
          <th><button class="sort-btn" data-sort="rank">順位<i class="arrow" aria-hidden="true"></i></button></th>
          <th>モデル</th>
          <th><button class="sort-btn" data-sort="score">スコア<i class="arrow" aria-hidden="true"></i></button></th>
          <th>提供企業</th>
          <th class="chevron-col"><span class="sr-only">詳細</span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  
  <section id="panel-code"
           role="tabpanel"
           aria-labelledby="tab-code"
           class="panel hidden">
    <table class="ranking-table" data-cat="code">
      <thead>
        <tr>
          <th><button class="sort-btn" data-sort="rank">順位<i class="arrow" aria-hidden="true"></i></button></th>
          <th>モデル</th>
          <th><button class="sort-btn" data-sort="score">スコア<i class="arrow" aria-hidden="true"></i></button></th>
          <th>提供企業</th>
          <th class="chevron-col"><span class="sr-only">詳細</span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  
  <section id="panel-vision"
           role="tabpanel"
           aria-labelledby="tab-vision"
           class="panel hidden">
    <table class="ranking-table" data-cat="vision">
      <thead>
        <tr>
          <th><button class="sort-btn" data-sort="rank">順位<i class="arrow" aria-hidden="true"></i></button></th>
          <th>モデル</th>
          <th><button class="sort-btn" data-sort="score">スコア<i class="arrow" aria-hidden="true"></i></button></th>
          <th>提供企業</th>
          <th class="chevron-col"><span class="sr-only">詳細</span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  
  <section id="panel-text-to-image"
           role="tabpanel"
           aria-labelledby="tab-text-to-image"
           class="panel hidden">
    <table class="ranking-table" data-cat="text-to-image">
      <thead>
        <tr>
          <th><button class="sort-btn" data-sort="rank">順位<i class="arrow" aria-hidden="true"></i></button></th>
          <th>モデル</th>
          <th><button class="sort-btn" data-sort="score">スコア<i class="arrow" aria-hidden="true"></i></button></th>
          <th>提供企業</th>
          <th class="chevron-col"><span class="sr-only">詳細</span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  

  <footer class="site-footer">
    <p>Data sourced from <a href="https://arena.ai">arena.ai</a></p>
  </footer>
</main>

<script type="application/json" id="arena-data">{"code": [], "text": [], "text-to-image": [], "vision": []}</script>
<script src="site.js"></script>
</body>
</html>
